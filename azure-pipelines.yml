- task: UniversalPackages@1
  inputs:
    command: 'publish'
    feed: 'packages'
    packageName: 'first'
    packageVersion: '''1.0-$(ARCHIVE_TAG)'''
    directory: '$(Build.ArtifactStagingDirectory)'


